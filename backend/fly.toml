# fly.toml — Fly.io deployment config for PocketDev backend
app = "pocketdev-backend"
primary_region = "sin"   # Singapore — change to: iad (US), lhr (UK), syd (AU)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  MAX_EXEC_TIME = "30"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
