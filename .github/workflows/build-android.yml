name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install --legacy-peer-deps

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"
          echo "✓ Debug keystore created"

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=debug.keystore \
            -PMYAPP_UPLOAD_STORE_PASSWORD=android \
            -PMYAPP_UPLOAD_KEY_ALIAS=androiddebugkey \
            -PMYAPP_UPLOAD_KEY_PASSWORD=android \
            --no-daemon \
            --stacktrace

      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          COMMIT=$(echo ${{ github.sha }} | cut -c1-7)
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             artifacts/PocketDevIDE-${DATE}-${COMMIT}.apk
          echo "APK_NAME=PocketDevIDE-${DATE}-${COMMIT}.apk" >> $GITHUB_ENV
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PocketDevIDE-APK
          path: artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "PocketDev IDE — Build ${{ github.run_number }}"
          body: |
            ## 📱 PocketDev IDE — Auto Build

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            ### Install on Android
            1. Download `PocketDevIDE-*.apk` below
            2. Settings → Security → **Allow Unknown Sources**
            3. Open the APK and tap Install
          files: artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "**APK:** \`${{ env.APK_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** $(du -sh artifacts/*.apk | cut -f1)" >> $GITHUB_STEP_SUMMARY
