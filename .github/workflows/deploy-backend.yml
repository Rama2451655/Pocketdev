name: Deploy Backend Server

on:
  push:
    branches: [main, master]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Deploy to which platform?'
        required: true
        default: 'railway'
        type: choice
        options:
          - railway
          - render
          - fly

jobs:
  # ══════════════════════════════
  # OPTION A — Railway (easiest, free tier)
  # ══════════════════════════════
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' || github.event.inputs.platform == 'railway') &&
      vars.DEPLOY_PLATFORM != 'render' && vars.DEPLOY_PLATFORM != 'fly'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "⚠️  RAILWAY_TOKEN secret not set."
            echo "Add it at: github.com/YOUR_NAME/pocketdev-ide/settings/secrets"
            echo "Get token at: railway.app/account/tokens"
            exit 0
          fi
          railway up --service pocketdev-backend
          echo "✅ Deployed to Railway"
          railway domain

  # ══════════════════════════════
  # OPTION B — Render (free tier)
  # ══════════════════════════════
  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: vars.DEPLOY_PLATFORM == 'render' || github.event.inputs.platform == 'render'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK secret not set."
            echo "Get it from: render.com → your service → Settings → Deploy Hook"
            exit 0
          fi
          curl -X POST "$RENDER_DEPLOY_HOOK"
          echo "✅ Render deploy triggered"

  # ══════════════════════════════
  # OPTION C — Fly.io
  # ══════════════════════════════
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: vars.DEPLOY_PLATFORM == 'fly' || github.event.inputs.platform == 'fly'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only
          echo "✅ Deployed to Fly.io"
          flyctl info
